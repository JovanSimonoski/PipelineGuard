services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull tinyllama && wait"]

  pipelineguard:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: tinyllama
      PIPELINE_RUN_INTERVAL: "8"
      ANOMALY_SENSITIVITY: medium
      SKIP_INFERENCE: "false"
    volumes:
      - ./:/app

volumes:
  ollama_data:
